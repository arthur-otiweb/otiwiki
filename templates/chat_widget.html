<div id="chat-widget" style="position: fixed; bottom: 20px; right: 20px; width: 350px; z-index: 1000;">
    <div class="card">
        <div class="card-header bg-info text-white" id="chat-header" style="cursor: pointer;">
            💬 Chat Interno OesteTI
            <span class="badge bg-success" id="online-status">Online</span>
        </div>
        <div id="chat-body" style="display: block;">
            <div id="chat-messages" style="height: 300px; overflow-y: auto; padding: 10px; background: #f8f9fa;"></div>
            <div class="card-footer">
                <input type="text" id="chat-input" class="form-control" placeholder="Digite sua mensagem...">
            </div>
        </div>
    </div>
</div>

<script>
    const chatSocket = new WebSocket('ws://' + window.location.host + '/ws/chat/');
    const messagesDiv = document.getElementById('chat-messages');
    const input = document.getElementById('chat-input');
    
    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        messagesDiv.innerHTML += `<div><strong>${data.usuario}:</strong> ${data.mensagem} <small class="text-muted">${data.timestamp}</small></div>`;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    };
    
    input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && input.value.trim()) {
            chatSocket.send(JSON.stringify({'mensagem': input.value}));
            input.value = '';
        }
    });
    
    document.getElementById('chat-header').onclick = function() {
        const body = document.getElementById('chat-body');
        body.style.display = body.style.display === 'none' ? 'block' : 'none';
    };
</script>
